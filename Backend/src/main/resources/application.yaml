server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: Zhikaoyun-Exam-Platform

  # 数据源配置
  datasource:
    url: ${DATASOURCE_URL:jdbc:mysql://localhost:3306/exam_system?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai}
    username: ${DATASOURCE_USERNAME:root}
    password: ${DATASOURCE_PASSWORD:changeme}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: ${HIKARI_MIN_IDLE:5}
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:20}
      idle-timeout: ${HIKARI_IDLE_TIMEOUT:300000}
      max-lifetime: ${HIKARI_MAX_LIFETIME:1200000}
      connection-timeout: ${HIKARI_CONN_TIMEOUT:30000}

# MyBatis 配置
mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: org.example.zhikaoyunexamplatform.**.entity
  configuration:
    map-underscore-to-camel-case: true
    # 生产环境请移除 SQL 日志输出，改为注释状态
    # log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT 配置
jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-here-must-be-long-enough}
  expiration: ${JWT_EXPIRATION:86400000}

# 日志配置
logging:
  level:
    org.example.zhikaoyunexamplatform: ${LOG_LEVEL:DEBUG}
    org.springframework.security: INFO